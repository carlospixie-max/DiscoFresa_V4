<!DOCTYPE html>
<!-- 
    DISCO FRESA 🍓 by Carlos Sánchez Sanz
    Versión: 4.1 Móvil - Simple y fijo
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disco Fresa 🍓</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ============================================
           RESET MÓVIL - Dimensiones fijas
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ============================================
           MÓVIL (única vista)
           ============================================ */
        @media (max-width: 768px) {
            .consola-general {
                width: 100vw;
                height: 100vh;
                max-width: 100%;
                max-height: 100%;
                background: white;
                padding: 0;
                margin: 0;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                position: fixed;
                top: 0;
                left: 0;
            }

            /* Ocultar segundo plato y maleta original */
            .consola[data-plato="2"],
            .consola-maleta {
                display: none !important;
            }

            /* Plato 1 ocupa la parte superior */
            .consola[data-plato="1"] {
                flex: 0 0 auto;
                background: white;
                padding: 10px;
                border-bottom: 1px solid #eee;
            }

            /* Info track compacto */
            .info-track-consola {
                font-size: 12px;
                padding: 4px 8px;
                margin-bottom: 5px;
                background: #f5f5f5;
                border-radius: 12px;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* Plato tamaño fijo proporcional */
            .plato {
                width: min(35vw, 35vh);
                height: min(35vw, 35vh);
                margin: 0 auto 5px auto;
                aspect-ratio: 1/1;
            }

            /* Botón superior más pequeño */
            .boton-superior {
                width: 40px !important;
                height: 40px !important;
                font-size: 20px !important;
                top: 5px;
                right: 5px;
            }

            /* Botones play/stop más pequeños */
            .boton-plato {
                width: 45px;
                height: 45px;
                font-size: 11px;
            }

            /* RPM info */
            .pitch-info {
                font-size: 10px;
                margin: 2px 0;
            }

            /* Ocultar barra de progreso gris */
            .progress-container {
                display: none !important;
            }

            /* ========================================
               PESTAÑA DESLIZANTE
               ======================================== */
            .movil-tab {
                display: flex !important;
                justify-content: center;
                align-items: center;
                background: #f0f0f0;
                padding: 6px 0;
                margin: 0;
                cursor: pointer;
                font-size: 18px;
                color: #666;
                width: 100%;
                border-top: 1px solid #ddd;
                border-bottom: 1px solid #ddd;
                flex: 0 0 auto;
            }

            /* Contenedor deslizante (ocupa el resto) */
            #movilSlideContainer {
                flex: 1 1 auto;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                min-height: 0;
                background: #fafafa;
            }

            /* Lista de canciones (deslizable internamente) */
            #movilSongList {
                flex: 1 1 auto;
                overflow-y: auto;
                padding: 10px;
                background: white;
                -webkit-overflow-scrolling: touch;
            }

            /* Controles (ocultos por defecto) */
            #movilControles {
                flex: 1 1 auto;
                overflow-y: auto;
                padding: 15px;
                background: #fafafa;
                -webkit-overflow-scrolling: touch;
            }

            #movilControles.hidden {
                display: none;
            }

            /* Items de la lista */
            .song-item {
                padding: 8px !important;
                margin: 5px 0 !important;
                gap: 8px !important;
            }

            .song-number {
                width: 24px !important;
                height: 24px !important;
                font-size: 11px !important;
            }

            .song-item img {
                width: 35px !important;
                height: 35px !important;
            }

            /* Grid colecciones - 2 columnas */
            #discosGrid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
                padding: 10px !important;
                max-height: 300px !important;
            }

            #discosGrid > div {
                width: 100% !important;
                max-width: none !important;
            }

            #discosGrid img {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: 1/1;
            }

            /* Quitar marcos de portada y créditos */
            #cuadradoPortadaPrincipal,
            #cuadradoInfoAlbum {
                border: none !important;
                background: transparent !important;
                box-shadow: none !important;
            }

            #cuadradoPortadaPrincipal {
                width: 80px !important;
                height: 80px !important;
            }

            #cuadradoInfoAlbum {
                width: calc(100% - 90px) !important;
                height: 80px !important;
                padding: 0 5px !important;
            }

            #albumTitulo, #albumArtista, #albumAnno {
                color: #333 !important;
            }

            /* Footer compacto */
            .maleta-footer {
                display: none !important;
            }
        }

        /* ============================================
           ESCRITORIO (se ve normal)
           ============================================ */
        @media (min-width: 769px) {
            .movil-tab,
            #movilSlideContainer,
            #movilControles,
            #movilSongList {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="consola-general">
        <!-- CONSOLA 1 (única visible en móvil) -->
        <div class="consola" data-plato="1">
            <!-- Info track -->
            <div class="info-track-consola" id="infoTrack1">
                <span class="sin-cargar">❌ Sin disco</span>
            </div>
            
            <!-- Plato y disco -->
            <div class="plato">
                <div class="boton-superior" id="btn-superior1">📀</div>
                <div class="disco" id="disco1">
                    <div class="label" id="label1">🎵</div>
                    <div class="linea"></div>
                    <div class="linea2"></div>
                </div>
                <div class="plato-botones">
                    <div class="boton-plato play" id="play1">Play</div>
                    <div class="boton-plato stop" id="stop1">STOP</div>
                </div>
                
                <!-- Punto de progreso -->
                <div class="disco-progress-container" id="discoProgress1">
                    <div class="disco-progress-point" id="discoProgressPoint1"></div>
                </div>
            </div>
            
            <!-- RPM -->
            <div class="pitch-info" id="rpm1">0 RPM</div>
            
            <!-- Cuadros de portada y álbum (sin marcos) -->
            <div style="display: flex; gap: 10px; margin: 5px 0;">
                <div id="cuadradoPortadaPrincipal">
                    <span style="color: #999; font-size: 12px;">portada</span>
                </div>
                
                <div id="cuadradoInfoAlbum">
                    <div style="font-weight: bold; color: #ff4444; font-size: 12px;">ÁLBUM</div>
                    <div id="albumTitulo" style="font-size: 13px; font-weight: bold;">-</div>
                    <div id="albumArtista" style="font-size: 11px; color: #666;">-</div>
                    <div id="albumAnno" style="font-size: 10px; color: #999;">-</div>
                </div>
            </div>
        </div>

        <!-- PESTAÑA DESLIZANTE -->
        <div class="movil-tab" id="movilTab">▼</div>

        <!-- CONTENEDOR DESLIZANTE -->
        <div id="movilSlideContainer">
            <!-- LISTA DE CANCIONES -->
            <div id="movilSongList">
                <div style="text-align: center; color: #999; padding: 20px;">
                    📀 Arrastra archivos para comenzar
                </div>
            </div>
            
            <!-- CONTROLES (ocultos inicialmente) -->
            <div id="movilControles" class="hidden">
                <div class="dual-control">
                    <div class="control-half">
                        <div class="control-header">
                            <span>GANANCIA</span>
                            <span class="valor" id="gain1-val">0.0</span>
                        </div>
                        <div class="slider-container">
                            <div class="slider-track">
                                <div class="slider-fill" id="gain1-fill"></div>
                                <div class="slider-center-marker"></div>
                            </div>
                            <input type="range" id="gain1" min="-12" max="12" value="0" step="0.5">
                        </div>
                    </div>
                    
                    <div class="control-half">
                        <div class="control-header">
                            <span>VOLUMEN</span>
                            <span class="valor" id="vol1-val">70</span>
                        </div>
                        <div class="slider-container">
                            <div class="slider-track">
                                <div class="slider-fill" id="vol1-fill"></div>
                            </div>
                            <input type="range" id="vol1" min="0" max="100" value="70" step="1">
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="control-header">PITCH</div>
                    <div class="slider-container">
                        <div class="slider-track">
                            <div class="slider-fill" id="pitch1-fill"></div>
                            <div class="slider-center-marker"></div>
                        </div>
                        <input type="range" id="pitch1" min="0.90" max="1.10" step="0.001" value="1.0">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- CONSOLA 2 (oculta en móvil) -->
        <div class="consola" data-plato="2">
            <!-- ... mismo contenido ... -->
        </div>
        
        <!-- MALETA ORIGINAL (oculta en móvil) -->
        <div class="consola-maleta" style="display: none;"></div>
    </div>
    
    <audio id="audio1"></audio>
    <audio id="audio2"></audio>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/maleta-utils.js"></script>
    <script src="js/maleta-core.js"></script>
    <script src="js/maleta-ui.js"></script>
    <script src="js/maleta-colecciones.js"></script>
    <script src="js/maleta-cargar.js"></script>
    <script src="js/maleta-guardar.js"></script>
    <script src="js/maleta-cargar-album.js"></script>
    <script src="js/maleta-cargar-colecciones.js"></script>
    <script src="js/maleta.js"></script>
    <script src="js/biblioteca.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        (function() {
            if (window.innerWidth <= 768) {
                const tab = document.getElementById('movilTab');
                const controles = document.getElementById('movilControles');
                const songList = document.getElementById('movilSongList');
                const slideContainer = document.getElementById('movilSlideContainer');
                
                if (tab && controles && songList) {
                    let showingControls = false;
                    
                    // Integrar con biblioteca.js
                    if (window.biblioteca) {
                        const originalUpdate = window.biblioteca.actualizarLista;
                        window.biblioteca.actualizarLista = function() {
                            originalUpdate.call(this);
                            const originalList = document.getElementById('songListBiblioteca');
                            if (originalList && originalList.children.length > 0) {
                                songList.innerHTML = originalList.innerHTML;
                            } else {
                                songList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">📀 Arrastra archivos para comenzar</div>';
                            }
                        };
                    }
                    
                    tab.addEventListener('click', function() {
                        showingControls = !showingControls;
                        
                        if (showingControls) {
                            controles.classList.remove('hidden');
                            songList.style.display = 'none';
                            tab.innerHTML = '▲';
                        } else {
                            controles.classList.add('hidden');
                            songList.style.display = 'block';
                            tab.innerHTML = '▼';
                        }
                    });
                }
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<!-- 
    DISCO FRESA 🍓 by Carlos Sánchez Sanz
    Versión: 4.3 Final
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disco Fresa 🍓</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ============================================
           MÓVIL
           ============================================ */
        @media (max-width: 768px) {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .consola-general {
                width: 100vw;
                height: 100vh;
                background: white;
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                grid-template-columns: 1fr !important;
                padding: 0 !important;
                gap: 0 !important;
            }

            .consola[data-plato="2"],
            .consola-maleta,
            .controles-consola,
            .dual-control,
            .control-group,
            .pitch-info {
                display: none !important;
            }

            .consola[data-plato="1"] {
                display: flex !important;
                flex-direction: column;
                background: white;
                padding: 15px 10px 5px 10px;
                flex: 0 0 auto;
            }

            .info-track-consola {
                font-size: 13px;
                padding: 6px 12px;
                margin-bottom: 10px;
                background: #f0f0f0;
                border-radius: 20px;
            }

            .plato {
                width: min(45vw, 45vh);
                height: min(45vw, 45vh);
                margin: 0 auto 10px auto;
            }

            .boton-superior {
                width: 40px !important;
                height: 40px !important;
                font-size: 20px !important;
            }

            .boton-plato {
                width: 50px;
                height: 50px;
                font-size: 11px;
            }

            .progress-container {
                display: block !important;
                margin: 5px auto 15px auto;
                width: 90%;
            }

            #movilSongList {
                flex: 1 1 auto;
                overflow-y: auto;
                padding: 10px;
                background: #f5f5f5;
                border-top: 1px solid #ddd;
            }

            .song-item {
                background: white !important;
                padding: 8px !important;
                margin: 5px 0 !important;
                border-radius: 8px !important;
            }
        }

        /* ============================================
           ESCRITORIO
           ============================================ */
        @media (min-width: 769px) {
            #movilSongList {
                display: none !important;
            }

            .consola-maleta {
                display: block !important;
            }

            .consola[data-plato="2"] {
                display: block !important;
            }

            .consola[data-plato="1"] .controles-consola {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="consola-general">
        <!-- CONSOLA 1 (sin controles) -->
        <div class="consola" data-plato="1">
            <div class="info-track-consola" id="infoTrack1">
                <span class="sin-cargar">❌ Sin disco</span>
            </div>
            
            <div class="plato">
                <div class="boton-superior" id="btn-superior1">📀</div>
                <div class="disco" id="disco1">
                    <div class="label" id="label1">🎵</div>
                    <div class="linea"></div>
                    <div class="linea2"></div>
                </div>
                <div class="plato-botones">
                    <div class="boton-plato play" id="play1">Play</div>
                    <div class="boton-plato stop" id="stop1">STOP</div>
                </div>
                
                <div class="disco-progress-container" id="discoProgress1">
                    <div class="disco-progress-point" id="discoProgressPoint1"></div>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar1">
                    <div class="progress-fill" id="progress-fill1"></div>
                </div>
                <div class="progress-time">
                    <span id="progress-current1">0:00</span>
                    <span id="progress-total1">0:00</span>
                </div>
            </div>
        </div>

        <!-- LISTA MÓVIL -->
        <div id="movilSongList">
            <div style="text-align: center; color: #999; padding: 20px;">
                📀 Arrastra archivos para comenzar
            </div>
        </div>
        
        <!-- CONSOLA 2 (con todos los controles) -->
        <div class="consola" data-plato="2">
            <div class="info-track-consola" id="infoTrack2">
                <span class="sin-cargar">❌ Sin disco</span>
            </div>
            
            <div class="plato">
                <div class="boton-superior" id="btn-superior2">📀</div>
                <div class="disco" id="disco2">
                    <div class="label" id="label2">🎵</div>
                    <div class="linea"></div>
                    <div class="linea2"></div>
                </div>
                <div class="plato-botones">
                    <div class="boton-plato play" id="play2">Play</div>
                    <div class="boton-plato stop" id="stop2">STOP</div>
                </div>
                
                <div class="disco-progress-container" id="discoProgress2">
                    <div class="disco-progress-point" id="discoProgressPoint2"></div>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar2">
                    <div class="progress-fill" id="progress-fill2"></div>
                </div>
                <div class="progress-time">
                    <span id="progress-current2">0:00</span>
                    <span id="progress-total2">0:00</span>
                </div>
            </div>
            
            <!-- Controles completos solo para plato 2 -->
            <div class="controles-consola">
                <div class="dual-control">
                    <div class="control-half">
                        <div class="control-header">
                            <span>GANANCIA</span>
                            <span class="valor" id="gain2-val">0.0</span>
                        </div>
                        <div class="slider-container">
                            <div class="slider-track">
                                <div class="slider-fill" id="gain2-fill"></div>
                                <div class="slider-center-marker"></div>
                            </div>
                            <input type="range" id="gain2" min="-12" max="12" value="0" step="0.5">
                        </div>
                    </div>
                    
                    <div class="control-half">
                        <div class="control-header">
                            <span>VOLUMEN</span>
                            <span class="valor" id="vol2-val">70</span>
                        </div>
                        <div class="slider-container">
                            <div class="slider-track">
                                <div class="slider-fill" id="vol2-fill"></div>
                            </div>
                            <input type="range" id="vol2" min="0" max="100" value="70" step="1">
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="control-header">ECUALIZADOR</div>
                    <div class="eq-container">
                        <div class="eq-band">
                            <div class="frecuencia">LOW</div>
                            <div class="slider-container">
                                <div class="slider-track">
                                    <div class="slider-fill" id="eq2-low-fill"></div>
                                    <div class="slider-center-marker"></div>
                                </div>
                                <input type="range" id="eq2-low" min="-12" max="12" value="0" step="0.5">
                            </div>
                            <div class="valor" id="eq2-low-val">0.0</div>
                        </div>
                        
                        <div class="eq-band">
                            <div class="frecuencia">MID</div>
                            <div class="slider-container">
                                <div class="slider-track">
                                    <div class="slider-fill" id="eq2-mid-fill"></div>
                                    <div class="slider-center-marker"></div>
                                </div>
                                <input type="range" id="eq2-mid" min="-12" max="12" value="0" step="0.5">
                            </div>
                            <div class="valor" id="eq2-mid-val">0.0</div>
                        </div>
                        
                        <div class="eq-band">
                            <div class="frecuencia">HIGH</div>
                            <div class="slider-container">
                                <div class="slider-track">
                                    <div class="slider-fill" id="eq2-high-fill"></div>
                                    <div class="slider-center-marker"></div>
                                </div>
                                <input type="range" id="eq2-high" min="-12" max="12" value="0" step="0.5">
                            </div>
                            <div class="valor" id="eq2-high-val">0.0</div>
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <div class="control-header">
                        <span>PITCH</span>
                        <span class="valor" id="pitch2-val">0</span>
                    </div>
                    <div class="slider-container">
                        <div class="slider-track">
                            <div class="slider-fill" id="pitch2-fill"></div>
                            <div class="slider-center-marker"></div>
                        </div>
                        <input type="range" id="pitch2" min="0.90" max="1.10" step="0.001" value="1.0">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- MALETA -->
        <div class="consola-maleta">
            <div class="maleta-titulo">🍓 DISCO FRESA</div>
            
            <input type="file" id="file1" accept="audio/*" class="file-input-hidden">
            <input type="file" id="file2" accept="audio/*" class="file-input-hidden">
            
            <div class="modo-selector-container">
                <span class="modo-label">Manual</span>
                <div id="selectorModoContainer" class="modo-switch">
                    <div class="modo-track"></div>
                    <div id="selectorModoFill" class="modo-fill"></div>
                    <div class="modo-center"></div>
                    <div id="selectorModoThumb" class="modo-thumb"></div>
                    <input type="range" id="selectorModoRange" min="0" max="1" value="0" step="1">
                </div>
                <span class="modo-label">Auto</span>
            </div>
            
            <div class="maleta-footer">
                <div>🍓 <strong>DISCO FRESA</strong> v4.3</div>
                <div>by Carlos Sánchez Sanz</div>
                <div>carlospixie@gmail.com</div>
            </div>
        </div>
    </div>
    
    <audio id="audio1"></audio>
    <audio id="audio2"></audio>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/maleta-utils.js"></script>
    <script src="js/maleta-core.js"></script>
    <script src="js/maleta-ui.js"></script>
    <script src="js/maleta-colecciones.js"></script>
    <script src="js/maleta-cargar.js"></script>
    <script src="js/maleta-guardar.js"></script>
    <script src="js/maleta-cargar-album.js"></script>
    <script src="js/maleta-cargar-colecciones.js"></script>
    <script src="js/maleta.js"></script>
    <script src="js/biblioteca.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        (function() {
            if (window.innerWidth <= 768) {
                const songList = document.getElementById('movilSongList');
                
                if (window.biblioteca && songList) {
                    const originalUpdate = window.biblioteca.actualizarLista;
                    window.biblioteca.actualizarLista = function() {
                        originalUpdate.call(this);
                        const originalList = document.getElementById('songListBiblioteca');
                        if (originalList && originalList.children.length > 0) {
                            songList.innerHTML = originalList.innerHTML;
                        } else {
                            songList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">📀 Arrastra archivos para comenzar</div>';
                        }
                    };
                }
            }
        })();
    </script>
</body>
</html>
